npc_id: blacksmith
name: "Gareth the Blacksmith"

fallbacks:
  - "That's not my trade, friend."
  - "Ask me about smithing, not nonsense."
  - "I work with metal, not riddles."

dialogue:
  name: "My name is Gareth."
  who: "I am the village blacksmith. Ask me about the SWORD or my WORK."
  look: "A burly man with soot-stained hands and a leather apron. His eyes gleam with pride."
  job: "I forge weapons and armor for the townsfolk. My best work is the SWORD."
  sword: "I forged a silver sword for the king himself. But it was lost in the DUNGEON long ago."
  dungeon: "The dungeon lies beneath the TEMPLE, past the castle gates to the north. You'll need courage."
  key: "The ELDER may know about the old passages. Ask her."
  news: "Strange folk have been seen near the pond at night. A STRANGER, cloaked in shadow."
  stranger: "I don't trust that hooded figure. Too quiet, too watchful."
  tavern: "The Rusty Flagon is just north of here. Marta brews good ale."
  castle: "The CASTLE lies north beyond the marketplace. The lord's taken ill — bad omen."
  marketplace: "Good market east of here. Bram the MERCHANT has fair prices."
  forest: "West lies the FOREST. A ranger patrols it. Don't go wandering alone at night."
  bye: "Fare thee well, traveler. May thy blade stay sharp."
