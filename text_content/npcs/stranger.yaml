npc_id: stranger
name: "Hooded Stranger"

fallbacks:
  - "..."
  - "That is not your concern."
  - "You ask too many questions."

dialogue:
  name: "Names have power. You may call me... a traveler."
  hi: "I am no one of consequence. Yet."
  look: "A tall figure draped in a dark cloak. Only pale eyes are visible beneath the hood."
  darkness: "The DARKNESS stirs beneath the TEMPLE. Something ancient awakens in the dungeon."
  quest: "If you seek purpose, find the silver SWORD the blacksmith speaks of. It was forged to banish darkness."
  secret: "There is a hidden passage beneath the old building. But you did not hear that from me."
  temple: "The temple holds the key. Speak to the PRIEST. And the knight's ghost... he knows the truth."
  dungeon: "The dungeon entrance is beneath the TEMPLE. Grimwald the keeper guards the way."
  sword: "A silver sword, forged to banish darkness. Lost in the dungeon long ago. It may yet be found."
  priest: "Father Aldwyn at the temple. He does not know what he truly guards. Tell him what you know."
  seals: "The seals of virtue hold back something terrible. Someone is breaking them. Deliberately."
  castle: "The lord's illness is no coincidence. Someone sent that dark-robed visitor."
  graveyard: "Even the dead are restless. The entire realm is out of balance."
  virtues: "The eight virtues are the answer. Not words — acts. True acts of virtue."
  bye: "We shall meet again. Of that I am certain."
