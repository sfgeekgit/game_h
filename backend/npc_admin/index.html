<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NPC Image Admin</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: #111827;
        color: #e5e7eb;
      }
      .container {
        max-width: 1120px;
        margin: 0 auto;
        padding: 16px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 28px;
      }
      .status {
        margin: 0 0 14px;
        color: #93c5fd;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
        gap: 10px;
      }
      .card {
        display: flex;
        gap: 12px;
        background: #1f2937;
        border: 1px solid #374151;
        border-radius: 8px;
        padding: 10px;
      }
      .thumb {
        width: 128px;
        height: 128px;
        object-fit: contain;
        image-rendering: pixelated;
        border: 1px solid #4b5563;
        background: #0f172a;
      }
      .meta {
        min-width: 0;
      }
      .id {
        margin: 0 0 4px;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 12px;
        color: #93c5fd;
      }
      .name {
        margin: 0 0 8px;
        font-size: 17px;
      }
      .look {
        margin: 0 0 8px;
        color: #d1d5db;
        line-height: 1.35;
        font-size: 14px;
      }
      a {
        color: #93c5fd;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>NPC Image Admin</h1>
      <p class="status" id="status">Loading...</p>
      <div class="grid" id="grid"></div>
    </div>

    <script src="./app.js" defer></script>
  </body>
</html>
